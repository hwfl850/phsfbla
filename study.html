function getStudyPage() {
  const h = location.hash.replace('#', '').trim();
  if (!h)               return 'login';
  if (h === STUDY_HASH) return 'study';
  return 'denied';
}

function renderStudyPage() {
  main.innerHTML = '';

    case 'login':  renderLogin();  break;
    case 'study':  renderStudy();  break;
    default:       renderDenied(); break;
  }
  main.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

window.addEventListener('hashchange', renderStudyPage);

// ── AI call helper ──────────────────────────────────────────────────────────
async function callAI(body) {
  const key = localStorage.getItem('fbla_groq_key') || EMBEDDED_KEY;
  if (!key) throw new Error('NO_KEY');
  return fetch(AI_ENDPOINT, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
    body: JSON.stringify(body),
  });
}

function togglePwVisibility() {
  const input = document.getElementById('pw-input');
  if (!input) return;
  input.type = input.type === 'password' ? 'text' : 'password';
}

async function sha256Hex(text) {
  const enc = new TextEncoder();
  const buf = await crypto.subtle.digest('SHA-256', enc.encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function submitPassword() {
  const input = document.getElementById('pw-input');
  const btn   = document.getElementById('submit-btn');
  const txt   = document.getElementById('btn-text');
  const err   = document.getElementById('login-error');
  if (!input || !btn) return;

  const pw = input.value;
  if (!pw) { showError(err, 'Please enter the password.'); return; }

  btn.disabled = true;
  txt.innerHTML = 'Checking<span class="spinner"></span>';
  err.classList.remove('show');

  try {
    const hex = await sha256Hex(pw);
    if (hex === STUDY_HASH) {
      location.hash = '#' + hex;
    } else {
      btn.disabled = false;
      txt.textContent = 'Enter';
      showError(err, 'Incorrect password. Please try again.');
      input.value = '';
      input.focus();
    }
  } catch (e) {
    btn.disabled = false;
    txt.textContent = 'Enter';
    showError(err, 'An error occurred. Please try again.');
  }
}

function showError(el, msg) {
  el.textContent = msg;
  el.classList.add('show');
}

    const header = b.header ? `<h3 class="study-block-header">${escapeHtml(b.header)}</h3>` : '';

    const validLinks = (Array.isArray(b.links) ? b.links : []).filter(l => l && l.url);

function openChat() {
  const sidebar = document.getElementById('chat-sidebar');
  const overlay = document.getElementById('chat-overlay');
  const fab     = document.getElementById('chat-fab');
  if (!sidebar) return;
  sidebar.classList.add('open');
  sidebar.setAttribute('aria-hidden', 'false');
  overlay?.classList.add('show');
  fab?.classList.add('hidden');
  setTimeout(() => document.getElementById('chat-input')?.focus(), 280);
}

function closeChat() {
  const sidebar = document.getElementById('chat-sidebar');
  const overlay = document.getElementById('chat-overlay');
  const fab     = document.getElementById('chat-fab');
  if (!sidebar) return;
  sidebar.classList.remove('open');
  sidebar.setAttribute('aria-hidden', 'true');
  overlay?.classList.remove('show');
  fab?.classList.remove('hidden');
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeChat();
});

function filterStudyEvents(query) {
  const q = (query || '').trim().toLowerCase();
  const rows = document.querySelectorAll('#study-events .event-row');
  let visible = 0;
  rows.forEach(row => {
    const match = !q || (row.dataset.search || '').includes(q);
    row.style.display = match ? '' : 'none';
    if (match) visible++;
  });
  const empty = document.getElementById('study-events-empty');
  if (empty) empty.style.display = visible === 0 ? '' : 'none';
}

}

function formatQuizTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function startQuiz(eventName) {
  showQuizOverlay();
  renderQuizLoading(eventName);
  generateQuizQuestions(eventName);
}

function showQuizOverlay() {
  const el = document.getElementById('quiz-overlay');
  el.hidden = false;
  el.className = 'quiz-overlay';
  document.body.style.overflow = 'hidden';
}

function hideQuizOverlay() {
  const el = document.getElementById('quiz-overlay');
  el.hidden = true;
  el.innerHTML = '';
  document.body.style.overflow = '';
  if (quizState?.timerInterval) clearInterval(quizState.timerInterval);
  quizState = null;
}

function renderQuizLoading(eventName) {
  document.getElementById('quiz-overlay').innerHTML = `
    <div class="quiz-box">
      <div class="quiz-header">
        <span class="quiz-title">${escapeHtml(eventName)} — Practice Quiz</span>
        <button onclick="hideQuizOverlay()" style="background:none;border:none;color:rgba(255,255,255,.8);font-size:1.4rem;cursor:pointer;line-height:1;flex-shrink:0;" aria-label="Close quiz">&#x2715;</button>
      </div>
      <div class="quiz-loading">
        <div class="quiz-spinner"></div>
        <p style="font-weight:600;color:var(--primary);font-size:.95rem;">Generating your quiz&hellip;</p>
        <p style="font-size:.83rem;color:var(--text-muted);">Creating 25 questions for <strong>${escapeHtml(eventName)}</strong></p>
      </div>
    </div>`;
}

async function generateQuizQuestions(eventName) {
  const prompt = `Generate exactly 25 multiple-choice practice quiz questions for the FBLA competitive event: "${eventName}".

Return ONLY a valid JSON array with exactly 25 objects. Each object must have:
- "q": the question text (string)
- "opts": array of exactly 4 answer choices (strings, no letter labels like "A." or "1.")
- "ans": 0-based integer index of the correct answer (0, 1, 2, or 3)
- "exp": brief explanation of why the correct answer is right (1-2 sentences)

Questions should cover key topics, vocabulary, concepts, formulas, and skills tested in the FBLA ${eventName} objective exam. Vary difficulty (easy, medium, hard). Do not repeat questions.

Return ONLY the JSON array — no markdown, no code fences, no extra text.`;

  try {
    const response = await callAI({
      model: AI_MODEL,
      messages: [{ role: 'user', content: prompt }],
      temperature: 0.7,
      max_tokens: 8192,
    });

    if (!response.ok) {
      const errJson = await response.json().catch(() => ({}));
      throw new Error(errJson?.error?.message || `HTTP ${response.status}`);
    }

    const data = await response.json();
    const raw = data?.choices?.[0]?.message?.content;
    if (!raw) throw new Error('Empty response from AI.');

    let questions;
    try {
      questions = JSON.parse(raw);
    } catch (_) {
      const match = raw.match(/\[[\s\S]*\]/);
      if (!match) throw new Error('Could not parse questions from AI response. Try again.');
      questions = JSON.parse(match[0]);
    }

    if (!Array.isArray(questions) || questions.length === 0) {
      throw new Error('No questions returned. Please try again.');
    }

    questions = questions.map(q => ({
      q:    String(q.q   || '').trim(),
      opts: Array.isArray(q.opts) ? q.opts.slice(0, 4).map(String) : [],
      ans:  Number.isInteger(q.ans) ? Math.max(0, Math.min(3, q.ans)) : 0,
      exp:  String(q.exp  || '').trim(),
    })).filter(q => q.q && q.opts.length === 4).slice(0, 25);

    if (questions.length < 25) {
      throw new Error(`Only ${questions.length} usable questions returned (need 25). Please try again.`);
    }

    startQuizSession(eventName, questions);

  } catch (err) {
    const safeEvent = escapeHtml(eventName);
    document.getElementById('quiz-overlay').innerHTML = `
      <div class="quiz-box">
        <div class="quiz-header">
          <span class="quiz-title">${safeEvent} — Practice Quiz</span>
          <button onclick="hideQuizOverlay()" style="background:none;border:none;color:rgba(255,255,255,.8);font-size:1.4rem;cursor:pointer;line-height:1;flex-shrink:0;" aria-label="Close">&#x2715;</button>
        </div>
        <div class="quiz-loading">
          <p style="font-size:2.5rem;line-height:1;">&#x26A0;&#xFE0F;</p>
          <p style="font-weight:700;color:#c62828;">Failed to generate quiz</p>
          <p style="font-size:.83rem;color:var(--text-muted);max-width:360px;">${escapeHtml(err.message)}</p>
          <button class="quiz-next-btn" style="max-width:200px;margin-top:.5rem;" data-event="${escapeHtml(eventName)}" onclick="startQuiz(this.dataset.event)">Try Again</button>
          <button onclick="hideQuizOverlay()" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:.82rem;margin-top:.25rem;text-decoration:underline;">Cancel</button>
        </div>
      </div>`;
  }
}

function startQuizSession(eventName, questions) {
  quizState = {
    eventName,
    questions,
    current:       0,
    answers:       new Array(questions.length).fill(null),
    startTime:     Date.now(),
    timerInterval: null,
    timeLimit:     300,
    timeLeft:      300,
    finished:      false,
  };

  renderCurrentQuestion();

  quizState.timerInterval = setInterval(() => {
    if (!quizState || quizState.finished) return;
    quizState.timeLeft -= 1;
    updateTimerDisplay();
    if (quizState.timeLeft <= 0) {
      clearInterval(quizState.timerInterval);
      finishQuiz(true);
    }
  }, 1000);
}

function updateTimerDisplay() {
  const el = document.getElementById('quiz-timer');
  if (!el || !quizState) return;
  el.textContent = formatQuizTime(quizState.timeLeft);
  if (quizState.timeLeft <= 60) el.classList.add('warning');
  else el.classList.remove('warning');
}

function renderCurrentQuestion() {
  if (!quizState) return;
  const { questions, current, timeLeft, eventName } = quizState;
  const q       = questions[current];
  const total   = questions.length;
  const progress = (current / total) * 100;
  const letters  = ['A','B','C','D'];

  document.getElementById('quiz-overlay').innerHTML = `
    <div class="quiz-box">
      <div class="quiz-header">
        <span class="quiz-title">${escapeHtml(eventName)}</span>
        <div class="quiz-meta">
          <span style="opacity:.85">${current + 1}&thinsp;/&thinsp;${total}</span>
          <span class="quiz-timer ${timeLeft <= 60 ? 'warning' : ''}" id="quiz-timer">${formatQuizTime(timeLeft)}</span>
        </div>
        <button onclick="confirmQuitQuiz()" style="background:none;border:none;color:rgba(255,255,255,.7);font-size:1.3rem;cursor:pointer;line-height:1;padding:0;flex-shrink:0;" aria-label="Quit quiz">&#x2715;</button>
      </div>
      <div class="quiz-progress-bar">
        <div class="quiz-progress-fill" style="width:${progress}%"></div>
      </div>
      <div class="quiz-body">
        <div class="quiz-question-num">Question ${current + 1} of ${total}</div>
        <div class="quiz-question-text">${escapeHtml(q.q)}</div>
        <div class="quiz-options" id="quiz-options">
          ${q.opts.map((opt, i) => `
            <button class="quiz-option" id="opt-${i}" onclick="selectAnswer(${i})">
              <span class="opt-letter">${letters[i]}</span>
              <span>${escapeHtml(opt)}</span>
            </button>`).join('')}
        </div>
        <div id="quiz-feedback"></div>
      </div>
    </div>`;
}

function selectAnswer(chosenIdx) {
  if (!quizState) return;
  const { questions, current } = quizState;
  const q       = questions[current];
  const letters = ['A','B','C','D'];

  quizState.answers[current] = chosenIdx;

  document.querySelectorAll('.quiz-option').forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.ans)                          btn.classList.add('correct');
    else if (i === chosenIdx && i !== q.ans)  btn.classList.add('wrong');
  });

  const isLast    = (current + 1) >= questions.length;
  const isCorrect = chosenIdx === q.ans;
  const feedback  = document.getElementById('quiz-feedback');

  feedback.innerHTML = `
    <div style="margin-top:.9rem;padding:.8rem 1rem;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);font-size:.82rem;color:var(--text-muted);line-height:1.55;">
      <strong style="color:${isCorrect ? '#2e7d32' : '#c62828'}">${isCorrect ? '&#x2713; Correct!' : '&#x2717; Incorrect.'}</strong>
      ${q.exp ? ' ' + escapeHtml(q.exp) : ''}
    </div>
    <button class="quiz-next-btn" onclick="${isLast ? 'finishQuiz(false)' : 'nextQuestion()'}">
      ${isLast ? 'See Results &#x2192;' : 'Next Question &#x2192;'}
    </button>`;
}

function nextQuestion() {
  if (!quizState) return;
  quizState.current += 1;
  if (quizState.current >= quizState.questions.length) finishQuiz(false);
  else renderCurrentQuestion();
}

function confirmQuitQuiz() {
  if (confirm('Quit this quiz? Your progress will not be saved.')) hideQuizOverlay();
}

function finishQuiz(timedOut) {
  if (!quizState || quizState.finished) return;
  quizState.finished = true;
  clearInterval(quizState.timerInterval);

  const elapsed   = Math.round((Date.now() - quizState.startTime) / 1000);
  const { questions, answers, eventName } = quizState;
  const total     = questions.length;
  const correct   = answers.reduce((n, a, i) => n + (a === questions[i].ans ? 1 : 0), 0);
  const pct       = Math.round((correct / total) * 100);
  const letters   = ['A','B','C','D'];

  const history = loadQuizHistory();
  history.unshift({
    event:     eventName,
    score:     correct,
    total,
    pct,
    timeTaken: elapsed,
    date:      new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
  });
  localStorage.setItem('fbla_quiz_history', JSON.stringify(history.slice(0, 50)));

  const missed = questions
    .map((q, i) => ({ q, userAns: answers[i] }))
    .filter(({ q, userAns }) => userAns !== q.ans);

  const missedHtml = missed.length === 0
    ? '<p style="text-align:center;color:#2e7d32;font-weight:600;padding:1rem 0;">Perfect score — no missed questions! &#x1F389;</p>'
    : missed.map(({ q, userAns }) => `
        <div class="review-item">
          <div class="rq">${escapeHtml(q.q)}</div>
          <div class="ra">
            ${userAns !== null
              ? `Your answer: <span style="color:#c62828">${letters[userAns]}. ${escapeHtml(q.opts[userAns])}</span><br/>`
              : '<em>Not answered (time ran out)</em><br/>'}
            Correct: <span style="color:#2e7d32;font-weight:600">${letters[q.ans]}. ${escapeHtml(q.opts[q.ans])}</span><br/>
            ${q.exp ? `<em style="opacity:.8">${escapeHtml(q.exp)}</em>` : ''}
          </div>
        </div>`).join('');

  const circleColor = pct >= 80 ? '#2e7d32' : pct >= 60 ? 'var(--primary)' : '#c62828';

  document.getElementById('quiz-overlay').innerHTML = `
    <div class="quiz-box">
      <div class="quiz-header">
        <span class="quiz-title">${escapeHtml(eventName)} &mdash; Results</span>
        <button onclick="hideQuizOverlay()" style="background:none;border:none;color:rgba(255,255,255,.8);font-size:1.4rem;cursor:pointer;line-height:1;flex-shrink:0;" aria-label="Close">&#x2715;</button>
      </div>
      <div class="quiz-score-screen">
        ${timedOut ? '<p style="color:#c62828;font-weight:700;margin-bottom:.75rem;">&#x23F1; Time\'s up!</p>' : ''}
        <div class="quiz-score-circle" style="border-color:${circleColor}">
          <span class="quiz-score-pct" style="color:${circleColor}">${pct}%</span>
          <span class="quiz-score-lbl">Score</span>
        </div>
        <div class="quiz-score-stats">
          <div class="quiz-stat">
            <span class="quiz-stat-val" style="color:#2e7d32">${correct}</span>
            <span class="quiz-stat-key">Correct</span>
          </div>
          <div class="quiz-stat">
            <span class="quiz-stat-val" style="color:#c62828">${total - correct}</span>
            <span class="quiz-stat-key">Missed</span>
          </div>
          <div class="quiz-stat">
            <span class="quiz-stat-val">${formatQuizTime(elapsed)}</span>
            <span class="quiz-stat-key">Time Taken</span>
          </div>
        </div>
        <div class="quiz-review">
          <h3>&#x1F4DD; Review Missed Questions (${missed.length})</h3>
          ${missedHtml}
        </div>
        <div class="quiz-score-actions">
          <button class="btn btn-primary" data-event="${escapeHtml(eventName)}" onclick="startQuiz(this.dataset.event)">Retake Quiz</button>
          <button class="btn" style="background:var(--surface);border:1px solid var(--border);color:var(--text);" onclick="hideQuizOverlay()">Back to Study</button>
        </div>
      </div>
    </div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// CHATBOT LOGIC
// ─────────────────────────────────────────────────────────────────────────────
const SYSTEM_PROMPT = `You are the FBLA Study Assistant for Pensacola High School's Future Business Leaders of America chapter. Your role is to help students prepare for FBLA competitive events at the district, state, and national levels.

You have deep knowledge of:
- All FBLA competitive events: written objective tests, performance events, and team events
- Business Calculations (financial math, interest, depreciation, payroll, ratios)
- Economics (micro/macro, supply/demand, GDP, monetary/fiscal policy, trade)
- Business Law (contracts, torts, business organizations, employment, consumer protection)
- Accounting I & II (journal entries, ledgers, trial balances, financial statements, depreciation, payroll)
- Business Communication (grammar, memo writing, business letters, professional email)
- Parliamentary Procedure (Robert's Rules of Order, motions, voting, quorum, minutes)
- Public Speaking (speech structure, delivery, professional presence)
- Marketing (4 Ps, market research, branding, advertising, consumer behavior)
- Entrepreneurship (business plans, startup finance, competitive analysis, pitching)
- Business Ethics (ethical frameworks, case analysis, stakeholder theory)
- Computer concepts, spreadsheet formulas (Excel/Sheets), and word processing
- Job interview preparation, résumé writing, professional etiquette
- FBLA history, mission, and organizational structure
- Test-taking strategies for timed FBLA objective tests
- State and National Leadership Conference preparation

Respond in a friendly, encouraging, and knowledgeable tone. When students ask about specific topics, provide clear explanations, practice questions, or key facts they should memorize. Always be accurate. If asked to quiz the student, generate relevant practice questions. Keep answers concise unless the student asks for more detail.`;

function chatKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
}

function appendMessage(role, text) {
  const container = document.getElementById('chat-messages');
  if (!container) return;

  const div = document.createElement('div');
  div.className = `message ${role}`;
  const bubbleContent = role === 'bot' ? renderMarkdown(text) : escapeHtml(text).replace(/\n/g, '<br>');
  div.innerHTML = `
    <div class="msg-name">${role === 'user' ? 'You' : 'FBLA Study Assistant'}</div>
    <div class="msg-bubble">${bubbleContent}</div>
  `;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  const container = document.getElementById('chat-messages');
  if (!container) return;
  const div = document.createElement('div');
  div.className = 'message bot';
  div.id = 'typing-indicator';
  div.innerHTML = `
    <div class="msg-name">FBLA Study Assistant</div>
    <div class="typing-indicator">
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
    </div>
  `;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  document.getElementById('typing-indicator')?.remove();
}

function renderMarkdown(raw) {
  let t = raw.replace(/<think>[\s\S]*?<\/think>/gi, '').trim();
  t = escapeHtml(t);
  t = t.replace(/```[\w]*\n?([\s\S]*?)```/g, (_, code) =>
    `<pre style="background:#f4f4f4;border-radius:6px;padding:.6em .9em;overflow-x:auto;font-size:.85em"><code>${code.trim()}</code></pre>`
  );
  t = t.replace(/`([^`]+)`/g, '<code style="background:#f0f0f0;border-radius:3px;padding:.1em .35em;font-size:.9em">$1</code>');
  t = t.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/__(.+?)__/g, '<strong>$1</strong>');
  t = t.replace(/\*(?!\s)(.+?)(?<!\s)\*/g, '<em>$1</em>');
  t = t.replace(/^### (.+)$/gm, '<h4 style="margin:.6em 0 .2em;font-size:1em">$1</h4>');
  t = t.replace(/^## (.+)$/gm,  '<h3 style="margin:.7em 0 .3em;font-size:1.05em">$1</h3>');
  t = t.replace(/^# (.+)$/gm,   '<h2 style="margin:.8em 0 .3em;font-size:1.1em">$1</h2>');
  t = t.replace(/((?:^[*\-] .+\n?)+)/gm, (block) => {
    const items = block.trim().split('\n').map(l =>
      `<li style="margin:.15em 0">${l.replace(/^[*\-] /, '')}</li>`
    ).join('');
    return `<ul style="margin:.4em 0;padding-left:1.4em">${items}</ul>`;
  });
  t = t.replace(/((?:^\d+\. .+\n?)+)/gm, (block) => {
    const items = block.trim().split('\n').map(l =>
      `<li style="margin:.15em 0">${l.replace(/^\d+\. /, '')}</li>`
    ).join('');
    return `<ol style="margin:.4em 0;padding-left:1.4em">${items}</ol>`;
  });
  const blockTags = /^<(h[234]|ul|ol|pre|li)/;
  const paras = t.split(/\n{2,}/);
  t = paras.map(p => {
    p = p.trim();
    if (!p) return '';
    if (blockTags.test(p)) return p;
    return '<p style="margin:.4em 0">' + p.replace(/\n/g, '<br>') + '</p>';
  }).join('');
  return t;
}

async function sendMessage() {
  if (isBotTyping) return;
  const input   = document.getElementById('chat-input');
  const sendBtn = document.getElementById('send-btn');

  const text = input?.value?.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  appendMessage('user', text);
  chatHistory.push({ role: 'user', content: text });

  isBotTyping = true;
  sendBtn.disabled = true;
  showTyping();

  try {
    const response = await callAI({
      model: AI_MODEL,
      messages: [
        { role: 'system', content: SYSTEM_PROMPT },
        ...chatHistory,
      ],
      temperature: 0.7,
      top_p: 0.95,
      max_tokens: 1024,
    });

    if (!response.ok) {
      const errJson = await response.json().catch(() => ({}));
      throw new Error(errJson?.error?.message || `HTTP ${response.status}`);
    }

    const data = await response.json();
    const reply = data?.choices?.[0]?.message?.content;

    if (!reply) throw new Error('Empty response from AI.');

    chatHistory.push({ role: 'assistant', content: reply });
    removeTyping();
    appendMessage('bot', reply);

  } catch (err) {
    removeTyping();
    const errMsg = err.message === 'NO_KEY'
      ? 'The AI assistant is only available on the hosted version of this site. Visit the Replit-hosted app to use the chatbot.'
      : err.message.includes('API key') || err.message.includes('401') || err.message.includes('403')
        ? 'Invalid or expired API key. Please update it in the Admin Panel.'
        : `Error: ${err.message}. Check your internet connection.`;
    appendMessage('bot', errMsg);
  } finally {
    isBotTyping = false;
    sendBtn.disabled = !localStorage.getItem('fbla_groq_key') && !EMBEDDED_KEY;
  }
}

}
