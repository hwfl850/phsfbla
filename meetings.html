    .archive-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .archive-head {
      padding: .9rem 1.1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: .75rem;
      flex-wrap: wrap;
    }
    .archive-head .archive-title {
      font-family: var(--font-head);
      font-weight: 600;
      color: var(--navy);
      font-size: .95rem;
      display: flex; align-items: center; gap: .5rem;
      flex: 0 0 auto;
    }
    .archive-head .archive-title svg { color: var(--gold); }
    .archive-search {
      flex: 1 1 220px;
      min-width: 0;
      padding: .5rem .75rem;
      border: 1.5px solid var(--border);
      border-radius: 999px;
      font-family: var(--font-body);
      font-size: .85rem;
      color: var(--ink);
      background: var(--surface);
      transition: border-color .2s, box-shadow .2s;
    }
    .archive-search:focus {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(29,82,188,.15);
      background: var(--bg);
    }
    .archive-count {
      font-size: .75rem;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .archive-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .88rem;
    }
    .archive-table th, .archive-table td {
      padding: .55rem .9rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .archive-table th {
      font-family: var(--font-head);
      font-weight: 600;
      font-size: .72rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: var(--surface);
    }
    .archive-table tr:last-child td { border-bottom: 0; }
    .archive-table .col-date { white-space: nowrap; width: 1%; color: var(--navy); font-weight: 600; }
    .archive-table .col-title { color: var(--ink); }
    .archive-table .col-link { text-align: right; width: 1%; white-space: nowrap; }
    .archive-table .col-link a {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      padding: .25rem .65rem;
      border-radius: 999px;
      background: var(--surface);
      color: var(--navy);
      text-decoration: none;
      font-weight: 600;
      font-size: .78rem;
      border: 1px solid var(--border);
      transition: background .2s, color .2s, border-color .2s;
    }
    .archive-table .col-link a:hover {
      background: var(--navy);
      color: var(--white);
      border-color: var(--navy);
    }
    .archive-empty {
      padding: 1.5rem 1.1rem;
      text-align: center;
      color: var(--text-muted);
      font-size: .85rem;
    }
    @media (max-width: 560px) {
      .archive-table th, .archive-table td { padding: .5rem .65rem; }
      .archive-table { font-size: .82rem; }
      .archive-table .col-link a { padding: .2rem .55rem; font-size: .72rem; }
    }
  </style>
</head>

<script>
const MONTH_LONG  = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTH_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function parseArchiveDate(s) {
  if (!s || typeof s !== 'string') return null;
  const m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (!m) return null;
  const y = +m[1], mo = +m[2], d = +m[3];
  if (mo < 1 || mo > 12 || d < 1 || d > 31) return null;
  return { y, m: mo, d, iso: s };
}
function fmtArchiveDate(parsed) {
  if (!parsed) return '';
  return `${MONTH_SHORT[parsed.m - 1]} ${parsed.d}, ${parsed.y}`;
}
function safeArchiveHref(url) {
  if (!url || typeof url !== 'string') return null;
  const trimmed = url.trim();
  if (!trimmed) return null;
  if (/^(https?:\/\/|mailto:|\/|assets\/|src\/|Media\/)/i.test(trimmed)) return trimmed;
  try {
    const u = new URL(trimmed);
    if (u.protocol === 'http:' || u.protocol === 'https:' || u.protocol === 'mailto:') return u.href;
  } catch (_) {}
  return null;
}

function buildArchiveRows(entries) {
  return entries
    .map((e) => {
      const parsed = parseArchiveDate(e.date);
      const href = safeArchiveHref(e.url);
      return {
        parsed,
        iso: parsed ? parsed.iso : '',
        display: parsed ? fmtArchiveDate(parsed) : (e.date || ''),
        monthLong:  parsed ? MONTH_LONG[parsed.m - 1]  : '',
        monthShort: parsed ? MONTH_SHORT[parsed.m - 1] : '',
        title: e.title || '',
        href,
      };
    })
    .filter(r => r.title || r.iso || r.href)
    .sort((a, b) => (b.iso || '').localeCompare(a.iso || ''));
}

function archiveRowMatches(row, query) {
  if (!query) return true;
  const tokens = query.toLowerCase().split(/\s+/).filter(Boolean);
  if (!tokens.length) return true;
  const haystack = [
    row.iso,
    row.display,
    row.monthLong,
    row.monthShort,
    row.parsed ? String(row.parsed.y) : '',
    row.parsed ? String(row.parsed.m) : '',
    row.parsed ? String(row.parsed.m).padStart(2, '0') : '',
    row.title,
  ].join(' ').toLowerCase();
  return tokens.every(tok => haystack.includes(tok));
}

function renderArchiveTable(rows, query) {
  const filtered = rows.filter(r => archiveRowMatches(r, query));
  const countEl = document.getElementById('archive-count');
  if (countEl) {
    countEl.textContent = filtered.length === rows.length
      ? `${rows.length} ${rows.length === 1 ? 'entry' : 'entries'}`
      : `${filtered.length} of ${rows.length}`;
  }
  const body = document.getElementById('archive-body');
  if (!body) return;
  if (!filtered.length) {
    body.innerHTML = `<tr><td colspan="3" class="archive-empty">${rows.length ? 'No matches for that search.' : 'No meeting records yet.'}</td></tr>`;
    return;
  }
  body.innerHTML = filtered.map(r => `
    <tr>
      <td class="col-date">${escHtml(r.display)}</td>
      <td class="col-title">${escHtml(r.title) || '<span style="color:var(--text-muted)">(untitled)</span>'}</td>
      <td class="col-link">${r.href
        ? `<a href="${escHtml(r.href)}" target="_blank" rel="noopener">Open ↗</a>`
        : '<span style="color:var(--text-muted);font-size:.78rem;">no link</span>'}</td>
    </tr>
  `).join('');
}

function renderMeetings() {
  const main = document.getElementById('main-content');
  const t = currentTheme();
  const c = currentContent();
  const intro = (c.meetings && c.meetings.intro) || '';

  const safeEmbed = (url) => {
    try {
      const u = new URL(url);
      if (u.protocol !== 'https:') return null;
      if (!/^([a-z0-9-]+\.)*google\.com$/i.test(u.hostname)) return null;
      return u.href;
    } catch (_) { return null; }
  };
  const formSrc = t.showGoogleForm ? safeEmbed(c.googleFormEmbed) : null;

  const archiveEntries = Array.isArray(c.meetingArchive) ? c.meetingArchive : [];
  const showArchive = t.showMeetingArchive !== false && archiveEntries.length > 0;
  const archiveRows = showArchive ? buildArchiveRows(archiveEntries) : [];

  const m = c.meetings || {};
  const showIntro = t.showMeetingsIntro !== false && intro.trim();
  const introHtml = intro.trim()
    .split(/\n{2,}/)
    .map(p => `<p style="color:var(--text-muted);font-size:1rem;line-height:1.7;max-width:780px;margin:0 auto .9rem;">${escHtml(p.trim())}</p>`)
    .join('');

  main.innerHTML = `
    ${showIntro ? `
    <section class="section" id="section-meetings-intro">
      <div class="section-inner">
        ${m.eyebrow ? `<div class="section-eyebrow">${escHtml(m.eyebrow)}</div>` : ''}
        ${m.title ? `<h2 class="section-title">${escHtml(m.title)}</h2>` : ''}
        <div class="section-line"></div>
        ${introHtml}
      </div>
    </section>
    ` : ''}

    ${showArchive ? `
    <section class="section" id="section-archive">
      <div class="section-inner">
        <div class="section-eyebrow">Records</div>
        <h2 class="section-title">Meeting Archive</h2>
        <div class="section-line"></div>
        <div class="archive-card">
          <div class="archive-head">
            <div class="archive-title">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 18H5V8h14v13z"/></svg>
              Past meetings
            </div>
            <input type="search" id="archive-search" class="archive-search" placeholder="Search by month or date (e.g. June, 2026-06, Jun 3)…" aria-label="Search archive" />
            <span class="archive-count" id="archive-count"></span>
          </div>
          <table class="archive-table">
            <thead>
              <tr><th>Date</th><th>Title</th><th></th></tr>
            </thead>
            <tbody id="archive-body"></tbody>
          </table>
        </div>
      </div>
    </section>
    ` : ''}

    ${formSrc ? `
    <section class="section${showArchive ? ' section-alt' : ''}" id="section-form">
      <div class="section-inner">
        <div class="section-eyebrow">Check In</div>
        <h2 class="section-title">Google Form</h2>
        <div class="section-line"></div>
        <div class="embeds-grid">
          <div class="embed-card">
            <iframe class="embed-frame" src="${escHtml(formSrc)}"
                    title="Sign-up form" loading="lazy"
                    referrerpolicy="no-referrer"
                    sandbox="allow-scripts allow-same-origin allow-popups allow-forms"></iframe>
          </div>
        </div>
      </div>
    </section>
    ` : ''}
  `;

  if (showArchive) {
    renderArchiveTable(archiveRows, '');
    const search = document.getElementById('archive-search');
    if (search) {
      search.addEventListener('input', (e) => renderArchiveTable(archiveRows, e.target.value));
    }
  }
}

function onSiteReady() {
  renderMeetings();
}
</script>
