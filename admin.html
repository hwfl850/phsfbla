<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PHSFBLA Admin</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
    input, textarea { width: 100%; margin: 8px 0 16px; padding: 8px; box-sizing: border-box; }
    button { padding: 10px 20px; background: #c00; color: white; border: none; cursor: pointer; }
    #status { margin-top: 16px; font-weight: bold; }
  </style>
</head>
<body>
  <h2>PHSFBLA Admin</h2>

  <label>Password</label>
  <input type="password" id="password" placeholder="Admin password">

  <hr>
  <h3>Upload Image</h3>
  <label>GitHub path (e.g. assets/images/photo.jpg)</label>
  <input type="text" id="imgPath" placeholder="assets/images/photo.jpg">
  <input type="file" id="imgFile" accept="image/*">
  <button onclick="uploadImage()">Upload Image</button>

  <hr>
  <h3>Edit HTML File</h3>
  <label>GitHub path (e.g. index.html)</label>
  <input type="text" id="htmlPath" placeholder="index.html">
  <textarea id="htmlContent" rows="12" placeholder="Paste new file content here"></textarea>
  <button onclick="updateHTML()">Push HTML</button>

  <div id="status"></div>

  <script>
    const WORKER_URL = "https://YOUR_WORKER.YOUR_SUBDOMAIN.workers.dev";

    function setStatus(msg, ok = true) {
      const el = document.getElementById("status");
      el.textContent = msg;
      el.style.color = ok ? "green" : "red";
    }

    async function push(path, content, message) {
      const password = document.getElementById("password").value;
      const res = await fetch(WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password, path, content, message }),
      });
      return res;
    }

    async function uploadImage() {
      const path = document.getElementById("imgPath").value;
      const file = document.getElementById("imgFile").files[0];
      if (!path || !file) return setStatus("Fill in path and select a file.", false);

      const reader = new FileReader();
      reader.onload = async () => {
        const base64 = reader.result.split(",")[1];
        const res = await push(path, base64, `Upload ${file.name}`);
        res.ok ? setStatus("Image uploaded!") : setStatus("Failed: " + res.status, false);
      };
      reader.readAsDataURL(file);
    }

    async function updateHTML() {
      const path = document.getElementById("htmlPath").value;
      const content = document.getElementById("htmlContent").value;
      if (!path || !content) return setStatus("Fill in path and content.", false);

      const base64 = btoa(unescape(encodeURIComponent(content)));
      const res = await push(path, base64, `Update ${path}`);
      res.ok ? setStatus("File updated!") : setStatus("Failed: " + res.status, false);
    }
  </script>
</body>
</html>
