<script src="assets/site.js"></script>
<script>
function renderAbout() {
  const main = document.getElementById('main-content');
  const t = currentTheme();
  const c = currentContent();

  const officersHtml = c.officers.map(off => {
    const initials = (off.name || off.role || '?')
      .split(/\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase();
    const displayName = off.name || 'Pensacola High FBLA';
    const avatar = off.photo
      ? `<img src="${escHtml(off.photo)}" alt="${escHtml(displayName)}" loading="lazy" />`
      : escHtml(initials);
    return `
      <div class="officer">
        <div class="officer-avatar">${avatar}</div>
        <h4>${escHtml(off.role)}</h4>
        <span>${escHtml(displayName)}</span>
      </div>`;
  }).join('');

  main.innerHTML = `
    <section class="section">
      <div class="section-inner">
        <div class="section-eyebrow">About Us</div>
        <h2 class="section-title">Pensacola High FBLA</h2>
        <div class="section-line"></div>
        <p style="color:var(--text-muted);font-size:1rem;line-height:1.7;max-width:780px;">
          ${escHtml(c.subheadline)}
        </p>
      </div>
    </section>

    ${t.showOfficers && c.officers.length ? `
    <section class="section section-alt" id="section-officers">
      <div class="section-inner">
        <div class="section-eyebrow">2026 – 2027 Leadership</div>
        <h2 class="section-title">Chapter Officers</h2>
        <div class="section-line"></div>
        <div class="officers">${officersHtml}</div>
      </div>
    </section>
    ` : ''}
  `;
}

function onSiteReady() {
  renderAbout();
}
</script>
