<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Pensacola High School FBLA – Future Business Leaders of America chapter site with study resources and AI-powered prep tools." />
  <meta property="og:title" content="Pensacola High FBLA" />
  <meta property="og:description" content="Future Business Leaders of America – Pensacola High School Chapter" />
  <meta property="og:type" content="website" />
  <title>Pensacola High FBLA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Merriweather:wght@700;900&display=swap" rel="stylesheet" />

  <!--
  ╔══════════════════════════════════════════════════════════════════╗
  ║                     SECURITY NOTICE                             ║
  ║                                                                 ║
  ║  Password protection on this page is URL-obscurity-based.      ║
  ║  The study page URL fragment is the SHA-256 hex digest of the  ║
  ║  access password. SHA-256 is a one-way cryptographic hash —    ║
  ║  the digest embedded here cannot be reversed to recover the    ║
  ║  original password without an exhaustive preimage attack.      ║
  ║                                                                 ║
  ║  The password is NEVER stored or transmitted — only its hash   ║
  ║  is compared at runtime in the browser using the Web Crypto    ║
  ║  API (crypto.subtle). The study page URL is not linked from    ║
  ║  any navigation element; direct URL knowledge is required.     ║
  ║                                                                 ║
  ║  The Gemini API key is stored exclusively in the visiting      ║
  ║  user's own browser localStorage and is never sent anywhere    ║
  ║  other than Google's Gemini API endpoint.                      ║
  ╚══════════════════════════════════════════════════════════════════╝
  -->

  <style>
    /* ── CSS custom properties (theme, overridden by admin panel) ── */
    :root {
      --primary:    #003DA5;
      --accent:     #FFD100;
      --bg:         #ffffff;
      --surface:    #f4f6fb;
      --text:       #0d1b3e;
      --text-muted: #5a6a8a;
      --border:     #d0d8ee;
      --radius:     10px;
      --font-body:  'Inter', sans-serif;
      --font-head:  'Merriweather', serif;
      --shadow:     0 4px 24px rgba(0,61,165,0.10);
      --transition: 0.25s cubic-bezier(.4,0,.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--primary);
      color: #fff;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,.25);
      min-height: 68px;
    }

    .logo-area {
      display: flex;
      align-items: center;
      cursor: pointer;
      text-decoration: none;
    }

    .logo-img {
      height: 46px;
      width: auto;
      background: #fff;
      border-radius: 8px;
      padding: 5px 14px;
      display: block;
    }

    nav { display: flex; gap: .25rem; align-items: center; }

    nav a {
      color: rgba(255,255,255,.88);
      text-decoration: none;
      padding: .45rem .85rem;
      border-radius: var(--radius);
      font-size: .88rem;
      font-weight: 500;
      transition: background var(--transition), color var(--transition);
    }

    nav a:hover, nav a.active {
      background: rgba(255,255,255,.15);
      color: #fff;
    }

    nav a.nav-accent {
      background: var(--accent);
      color: var(--primary);
      font-weight: 700;
      margin-left: .5rem;
    }

    nav a.nav-accent:hover { background: #ffe94d; }

    .hamburger {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: .4rem;
      color: #fff;
      flex-direction: column;
      gap: 5px;
    }

    .hamburger span {
      display: block;
      width: 24px;
      height: 2.5px;
      background: #fff;
      border-radius: 2px;
      transition: var(--transition);
    }

    /* ── Mobile nav ── */
    @media (max-width: 640px) {
      .hamburger { display: flex; }
      nav {
        display: none;
        position: absolute;
        top: 68px;
        left: 0; right: 0;
        background: var(--primary);
        flex-direction: column;
        padding: 1rem;
        gap: .5rem;
        box-shadow: 0 8px 24px rgba(0,0,0,.2);
      }
      nav.open { display: flex; }
      nav a { width: 100%; text-align: center; padding: .7rem; }
    }

    /* ── Main content ── */
    main {
      flex: 1;
      opacity: 1;
      transition: opacity var(--transition);
    }

    main.fading { opacity: 0; }

    /* ── Page container ── */
    .page { max-width: 1100px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

    /* ── Hero ── */
    .hero {
      background: linear-gradient(135deg, var(--primary) 0%, #0057c8 100%);
      color: #fff;
      padding: 5rem 1.5rem 4.5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 70% 50%, rgba(255,209,0,.18) 0%, transparent 60%);
    }

    .hero-content { position: relative; z-index: 1; max-width: 760px; margin: 0 auto; }

    .hero h1 {
      font-family: var(--font-head);
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 900;
      line-height: 1.15;
      margin-bottom: 1.1rem;
    }

    .hero h1 span { color: var(--accent); }

    .hero p {
      font-size: 1.1rem;
      line-height: 1.7;
      color: rgba(255,255,255,.9);
      max-width: 580px;
      margin: 0 auto 2rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      padding: .7rem 1.6rem;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: .95rem;
      cursor: pointer;
      text-decoration: none;
      border: none;
      transition: transform var(--transition), box-shadow var(--transition), background var(--transition);
    }

    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.2); }
    .btn:active { transform: translateY(0); }

    .btn-primary { background: var(--accent); color: var(--primary); }
    .btn-outline {
      background: transparent;
      color: #fff;
      border: 2px solid rgba(255,255,255,.5);
    }
    .btn-outline:hover { border-color: #fff; }
    .btn-danger { background: #dc3545; color: #fff; }

    .hero-actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }

    /* ── Sections ── */
    .section { padding: 3.5rem 1.5rem; }
    .section-alt { background: var(--surface); }

    .section-inner { max-width: 1100px; margin: 0 auto; }

    .section-title {
      font-family: var(--font-head);
      font-size: 1.75rem;
      font-weight: 900;
      color: var(--primary);
      margin-bottom: 0.4rem;
    }

    .section-line {
      width: 48px;
      height: 4px;
      background: var(--accent);
      border-radius: 2px;
      margin-bottom: 2rem;
    }

    /* ── Cards grid ── */
    .cards { display: grid; gap: 1.25rem; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }

    .card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--shadow);
      transition: transform var(--transition), box-shadow var(--transition);
    }

    .card:hover { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(0,61,165,.13); }

    .card-icon {
      width: 44px; height: 44px;
      background: var(--primary);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 1rem;
    }

    .card-icon svg { fill: var(--accent); }

    .card h3 {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: .4rem;
    }

    .card p {
      font-size: .88rem;
      line-height: 1.6;
      color: var(--text-muted);
    }

    .card a.card-link {
      display: inline-block;
      margin-top: .8rem;
      font-size: .82rem;
      font-weight: 600;
      color: var(--primary);
      text-decoration: underline;
    }

    /* ── Officers ── */
    .officers { display: flex; gap: 1.25rem; flex-wrap: wrap; }

    .officer {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      flex: 1 1 160px;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .officer-avatar {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: var(--primary);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto .75rem;
      font-size: 1.5rem;
      color: var(--accent);
      font-weight: 800;
    }

    .officer h4 { font-size: .95rem; font-weight: 700; color: var(--primary); }
    .officer span { font-size: .78rem; color: var(--text-muted); }

    /* ── CTA banner ── */
    .cta-banner {
      background: linear-gradient(135deg, var(--primary), #0057c8);
      color: #fff;
      border-radius: 14px;
      padding: 2.5rem;
      text-align: center;
    }

    .cta-banner h2 {
      font-family: var(--font-head);
      font-size: 1.5rem;
      margin-bottom: .7rem;
    }

    .cta-banner p { color: rgba(255,255,255,.85); margin-bottom: 1.5rem; }

    /* ── Events ── */
    .events-list { display: flex; flex-direction: column; gap: .75rem; }

    .event-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      display: flex;
      gap: 1rem;
      align-items: center;
      box-shadow: var(--shadow);
    }

    .event-date {
      background: var(--primary);
      color: var(--accent);
      font-weight: 800;
      font-size: .8rem;
      text-align: center;
      padding: .4rem .7rem;
      border-radius: 6px;
      flex-shrink: 0;
      line-height: 1.2;
    }

    .event-info h4 { font-size: .95rem; font-weight: 700; color: var(--primary); }
    .event-info p { font-size: .82rem; color: var(--text-muted); }

    /* ── Password page ── */
    .password-page {
      max-width: 420px;
      margin: 6rem auto;
      padding: 0 1.5rem;
    }

    .password-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      box-shadow: 0 8px 40px rgba(0,61,165,.13);
      text-align: center;
    }

    .password-card .lock-icon {
      width: 64px; height: 64px;
      background: var(--primary);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.25rem;
    }

    .password-card h2 {
      font-family: var(--font-head);
      font-size: 1.35rem;
      color: var(--primary);
      margin-bottom: .5rem;
    }

    .password-card p {
      font-size: .88rem;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
    }

    .password-input-wrap { position: relative; margin-bottom: 1rem; }

    .password-input-wrap input {
      width: 100%;
      padding: .7rem 2.8rem .7rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 1rem;
      font-family: var(--font-body);
      color: var(--text);
      background: var(--bg);
      transition: border-color var(--transition);
    }

    .password-input-wrap input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .password-toggle {
      position: absolute;
      right: .75rem; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; color: var(--text-muted);
      padding: 0;
    }

    .error-msg {
      background: #fff0f0;
      border: 1px solid #ffcdd2;
      color: #c62828;
      border-radius: 8px;
      padding: .6rem .9rem;
      font-size: .85rem;
      margin-bottom: 1rem;
      display: none;
    }

    .error-msg.show { display: block; }

    .btn-full { width: 100%; justify-content: center; }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2.5px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin-left: .3rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Study page ── */
    .study-header {
      background: linear-gradient(135deg, var(--primary) 0%, #0057c8 100%);
      color: #fff;
      padding: 3rem 1.5rem;
      text-align: center;
    }

    .study-header h1 {
      font-family: var(--font-head);
      font-size: clamp(1.5rem, 4vw, 2.3rem);
      margin-bottom: .5rem;
    }

    .study-header p { color: rgba(255,255,255,.85); font-size: .95rem; }

    .study-content { max-width: 1100px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

    .study-events { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); margin-bottom: 3rem; }

    .event-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: .5rem;
      transition: transform var(--transition), box-shadow var(--transition);
    }

    .event-card:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,61,165,.12); }

    .event-card-tag {
      display: inline-block;
      background: var(--primary);
      color: var(--accent);
      font-size: .7rem;
      font-weight: 700;
      padding: .2rem .6rem;
      border-radius: 4px;
      letter-spacing: .05em;
      text-transform: uppercase;
      align-self: flex-start;
    }

    .event-card h4 { font-size: .95rem; font-weight: 700; color: var(--primary); }
    .event-card p { font-size: .82rem; color: var(--text-muted); line-height: 1.55; }

    .event-card a {
      font-size: .8rem;
      font-weight: 600;
      color: var(--primary);
      text-decoration: underline;
      margin-top: auto;
    }

    /* ── Chatbot ── */
    .chatbot-section {
      background: var(--surface);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .chatbot-header {
      background: var(--primary);
      color: #fff;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: .75rem;
    }

    .chatbot-avatar {
      width: 40px; height: 40px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .chatbot-header .bot-name { font-weight: 700; font-size: .95rem; }
    .chatbot-header .bot-sub { font-size: .75rem; color: rgba(255,255,255,.75); }

    .chatbot-status {
      width: 9px; height: 9px;
      background: #4cde80;
      border-radius: 50%;
      margin-left: auto;
      box-shadow: 0 0 6px #4cde80;
    }

    .chatbot-messages {
      height: 380px;
      overflow-y: auto;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: .85rem;
      scroll-behavior: smooth;
    }

    .message {
      max-width: 82%;
      animation: msgIn .25s ease forwards;
    }

    @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    .message.user { align-self: flex-end; }
    .message.bot  { align-self: flex-start; }

    .msg-bubble {
      padding: .65rem 1rem;
      border-radius: 14px;
      font-size: .88rem;
      line-height: 1.6;
    }

    .message.user .msg-bubble {
      background: var(--primary);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.bot .msg-bubble {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .msg-name {
      font-size: .72rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: .2rem;
      padding: 0 .25rem;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: .65rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .typing-dot {
      width: 7px; height: 7px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: typingBounce 1.2s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: .2s; }
    .typing-dot:nth-child(3) { animation-delay: .4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    .chatbot-input-area {
      padding: 1rem 1.25rem;
      background: var(--bg);
      border-top: 1px solid var(--border);
      display: flex;
      gap: .6rem;
      align-items: flex-end;
    }

    .chatbot-input-area textarea {
      flex: 1;
      resize: none;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: .65rem .9rem;
      font-family: var(--font-body);
      font-size: .88rem;
      color: var(--text);
      background: var(--surface);
      max-height: 120px;
      transition: border-color var(--transition);
      line-height: 1.5;
    }

    .chatbot-input-area textarea:focus { outline: none; border-color: var(--primary); }

    .send-btn {
      width: 42px; height: 42px;
      background: var(--accent);
      color: #1a1a1a;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
    }

    .send-btn:hover { background: #e6bc00; transform: scale(1.07); box-shadow: 0 2px 8px rgba(0,0,0,.2); }
    .send-btn:active { background: #c9a500; transform: scale(.97); }
    .send-btn:disabled { background: #ccc; color: #888; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ── Access denied ── */
    .denied {
      text-align: center;
      padding: 8rem 1.5rem;
    }

    .denied h2 {
      font-family: var(--font-head);
      font-size: 2rem;
      color: #c62828;
      margin-bottom: .75rem;
    }

    .denied p { color: var(--text-muted); margin-bottom: 1.5rem; }

    /* ── Footer ── */
    footer {
      background: var(--primary);
      color: rgba(255,255,255,.7);
      text-align: center;
      padding: 1.5rem;
      font-size: .8rem;
      margin-top: auto;
    }

    footer strong { color: var(--accent); }

    footer a.insta-link {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      color: rgba(255,255,255,.85);
      text-decoration: none;
      font-size: .82rem;
      margin-top: .5rem;
      transition: color .2s;
    }
    footer a.insta-link:hover { color: #fff; }
    footer a.insta-link svg { flex-shrink: 0; }

    /* ── Utility ── */
    .badge {
      display: inline-block;
      background: var(--accent);
      color: var(--primary);
      font-size: .72rem;
      font-weight: 700;
      padding: .15rem .55rem;
      border-radius: 4px;
      margin-left: .4rem;
      text-transform: uppercase;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .anim { animation: fadeUp .5s ease both; }
    .anim-1 { animation-delay: .05s; }
    .anim-2 { animation-delay: .12s; }
    .anim-3 { animation-delay: .19s; }
    .anim-4 { animation-delay: .26s; }

    /* ── Quiz Me button on event cards ── */
    .quiz-btn {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      background: var(--primary);
      color: var(--accent);
      border: none;
      border-radius: 6px;
      padding: .38rem .8rem;
      font-size: .78rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: .25rem;
      align-self: flex-start;
      transition: background var(--transition), transform var(--transition);
    }
    .quiz-btn:hover { background: #0057c8; transform: translateY(-1px); }

    /* ── Quiz Overlay ── */
    .quiz-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,.55);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      animation: qFadeIn .2s ease;
    }
    @keyframes qFadeIn { from { opacity: 0; } to { opacity: 1; } }

    .quiz-box {
      background: var(--bg);
      border-radius: 16px;
      width: 100%;
      max-width: 680px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
      display: flex;
      flex-direction: column;
    }

    .quiz-header {
      background: var(--primary);
      color: #fff;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .75rem;
      border-radius: 16px 16px 0 0;
      flex-shrink: 0;
    }
    .quiz-title { font-weight: 700; font-size: .95rem; flex: 1; }

    .quiz-meta {
      display: flex;
      align-items: center;
      gap: .75rem;
      font-size: .82rem;
    }

    .quiz-timer {
      background: rgba(255,255,255,.18);
      border-radius: 6px;
      padding: .25rem .65rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: .04em;
    }
    .quiz-timer.warning { background: rgba(220,53,69,.85); animation: timerPulse .8s infinite; }
    @keyframes timerPulse { 0%,100% { opacity: 1; } 50% { opacity: .65; } }

    .quiz-progress-bar { height: 4px; background: var(--surface); flex-shrink: 0; }
    .quiz-progress-fill { height: 100%; background: var(--accent); transition: width .35s ease; }

    .quiz-body { padding: 1.75rem 1.5rem; flex: 1; }

    .quiz-question-num {
      font-size: .75rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: .5rem;
    }

    .quiz-question-text {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.6;
      margin-bottom: 1.25rem;
    }

    .quiz-options { display: flex; flex-direction: column; gap: .6rem; }

    .quiz-option {
      display: flex;
      align-items: flex-start;
      gap: .75rem;
      padding: .8rem 1rem;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      font-size: .88rem;
      color: var(--text);
      background: var(--bg);
      text-align: left;
      transition: border-color .15s, background .15s, transform .1s;
      width: 100%;
      font-family: var(--font-body);
      line-height: 1.45;
    }
    .quiz-option:hover:not(:disabled) { border-color: var(--primary); background: #eef2ff; transform: translateX(2px); }

    .opt-letter {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px; height: 26px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 6px;
      font-weight: 700;
      font-size: .78rem;
      flex-shrink: 0;
      transition: background .15s, border-color .15s, color .15s;
    }

    .quiz-option.correct { border-color: #2e7d32; background: #f1f8e9; }
    .quiz-option.correct .opt-letter { background: #2e7d32; border-color: #2e7d32; color: #fff; }
    .quiz-option.wrong   { border-color: #c62828; background: #fff5f5; }
    .quiz-option.wrong   .opt-letter { background: #c62828; border-color: #c62828; color: #fff; }
    .quiz-option:disabled { cursor: default; transform: none !important; }

    .quiz-next-btn {
      margin-top: 1.1rem;
      width: 100%;
      padding: .8rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: .92rem;
      cursor: pointer;
      font-family: var(--font-body);
      transition: background var(--transition), transform var(--transition);
    }
    .quiz-next-btn:hover { background: #0057c8; transform: translateY(-1px); }

    /* Quiz loading state */
    .quiz-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3.5rem 2rem;
      gap: .85rem;
      text-align: center;
    }
    .quiz-spinner {
      width: 44px; height: 44px;
      border: 4px solid var(--surface);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: qSpin .8s linear infinite;
    }
    @keyframes qSpin { to { transform: rotate(360deg); } }

    /* Score screen */
    .quiz-score-screen { padding: 2rem 1.5rem; text-align: center; }

    .quiz-score-circle {
      width: 118px; height: 118px;
      border-radius: 50%;
      border: 6px solid var(--primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
    }
    .quiz-score-pct  { font-size: 2rem; font-weight: 900; line-height: 1; color: var(--primary); }
    .quiz-score-lbl  { font-size: .72rem; color: var(--text-muted); margin-top: .1rem; }

    .quiz-score-stats {
      display: flex;
      justify-content: center;
      gap: 2.25rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .quiz-stat { display: flex; flex-direction: column; align-items: center; gap: .15rem; }
    .quiz-stat-val { font-size: 1.3rem; font-weight: 800; }
    .quiz-stat-key { font-size: .72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; }

    .quiz-review { text-align: left; border-top: 1px solid var(--border); padding-top: 1.25rem; }
    .quiz-review h3 { font-size: .9rem; font-weight: 700; color: var(--primary); margin-bottom: .85rem; }

    .review-item {
      background: var(--surface);
      border-radius: var(--radius);
      padding: .9rem 1rem;
      margin-bottom: .65rem;
      border-left: 3px solid #c62828;
    }
    .review-item .rq { font-size: .86rem; font-weight: 600; margin-bottom: .4rem; line-height: 1.45; }
    .review-item .ra { font-size: .8rem; color: var(--text-muted); line-height: 1.6; }

    .quiz-score-actions {
      display: flex;
      gap: .75rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 1.35rem;
    }

    /* Quiz history */
    .quiz-history-section { margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--border); }

    .quiz-history-list { display: flex; flex-direction: column; gap: .5rem; margin-top: 1rem; }

    .quiz-history-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .8rem 1.1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .qhi-event { font-weight: 700; font-size: .88rem; flex: 1; min-width: 140px; }
    .qhi-score { font-size: 1.1rem; font-weight: 800; }
    .qhi-meta  { font-size: .76rem; color: var(--text-muted); }
  </style>
</head>

function loadContent() {
  try {
    const base = _serverContent || JSON.parse(localStorage.getItem('fbla_content') || '{}');
    return deepMergeContent(CONTENT_DEFAULTS, base);
  } catch (_) { return JSON.parse(JSON.stringify(CONTENT_DEFAULTS)); }
}

function deepMergeContent(defaults, saved) {
  const result = JSON.parse(JSON.stringify(defaults));
  if (typeof saved.headline    === 'string') result.headline    = saved.headline;
  if (typeof saved.subheadline === 'string') result.subheadline = saved.subheadline;
  if (typeof saved.contactEmail === 'string') result.contactEmail = saved.contactEmail;
  if (Array.isArray(saved.events))   result.events   = saved.events;
  if (Array.isArray(saved.officers)) result.officers = saved.officers;
  return result;
}

function saveContent(c) {
  localStorage.setItem('fbla_content', JSON.stringify(c));
}

function currentContent() {
  return loadContent();
}

  } catch (_) { applyTheme(THEME_DEFAULTS); }

async function initSiteData() {
  try {
    const [contentRes, statusRes] = await Promise.all([
      fetch('/api/admin/content', { signal: AbortSignal.timeout(4000) }),
      fetch('/api/ai/status',     { signal: AbortSignal.timeout(4000) }),
    ]);
    if (contentRes.ok) {
      const data = await contentRes.json();
      if (data.content) _serverContent = data.content;
      if (data.theme)   _serverTheme   = data.theme;
    }
    if (statusRes.ok) {
      const s = await statusRes.json();
      _serverHasKey = !!s.hasKey;
    }
  } catch (_) { /* fall through — loadTheme/loadContent use localStorage/defaults */ }
}

// ─── Gemini call helper ──────────────────────────────────────────────────────
// Routes through the server proxy when the user has no personal key stored,
// or calls Gemini directly when they do (preserving the admin-panel key flow).
async function callGemini(body) {
  const userKey = localStorage.getItem('fbla_gemini_key') || '';
  const model   = localStorage.getItem('fbla_gemini_model') || GEMINI_MODEL;
  // 1. Personal key entered in admin panel → call Google directly
  if (userKey) {
    const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${userKey}`;
    return fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  }
  // 2. Server-side proxy key available (hosted on Replit)
  if (_serverHasKey) {
    return fetch('/api/ai/generate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ model, ...body }) });
  }
  // 3. Embedded fallback key → call Google directly (works on static hosting like GitHub Pages)
  if (EMBEDDED_KEY) {
    const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${EMBEDDED_KEY}`;
    return fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  }
  throw new Error('NO_KEY');
}

function applyTheme(t) {
  const r = document.documentElement.style;
  r.setProperty('--primary', t.primary);
  r.setProperty('--accent',  t.accent);
  r.setProperty('--bg',      t.bg);
  r.setProperty('--font-body', `'${t.fontBody}', sans-serif`);
  // Expose to sections
  window.__theme = t;
}

function saveTheme(t) {
  localStorage.setItem('fbla_theme', JSON.stringify(t));
  applyTheme(t);
}

function currentTheme() {
  try { return { ...THEME_DEFAULTS, ...JSON.parse(localStorage.getItem('fbla_theme') || '{}') }; }
  catch (_) { return { ...THEME_DEFAULTS }; }
}

// ─────────────────────────────────────────────────────────────────────────────
// HASH-BASED ROUTER
// ─────────────────────────────────────────────────────────────────────────────
function navigate(page) {
  if (page === 'home')  { location.hash = '#home';  return; }
  if (page === 'login') { location.hash = '#login'; return; }
  location.hash = '#' + page;
}

function getPage() {
  const h = location.hash.replace('#', '').trim();
  if (!h || h === 'home') return 'home';
  if (h === 'login')      return 'login';
  if (h === STUDY_HASH)   return 'study';
  return 'denied';
}

function updateNavActive(page) {
  document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
  if (page === 'home')  document.getElementById('nav-home')?.classList.add('active');
}

const main = document.getElementById('main-content');

function renderPage() {
  const page = getPage();
  main.classList.add('fading');
  setTimeout(() => {
    main.innerHTML = '';
    switch (page) {
      case 'home':  renderHome();  break;
      case 'login': renderLogin(); break;
      case 'study': renderStudy(); break;
      default:      renderDenied(); break;
    }
    updateNavActive(page);
    main.classList.remove('fading');
    main.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 200);
}

window.addEventListener('hashchange', renderPage);

  // Set logo srcs from embedded base64 (works on static/GitHub Pages hosting)

function togglePwVisibility() {
  const input = document.getElementById('pw-input');
  if (!input) return;

  input.type = isPassword ? 'text' : 'password';
}

async function sha256Hex(text) {
  const enc = new TextEncoder();
  const buf = await crypto.subtle.digest('SHA-256', enc.encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function submitPassword() {
  const input = document.getElementById('pw-input');
  const btn   = document.getElementById('submit-btn');
  const txt   = document.getElementById('btn-text');
  const err   = document.getElementById('login-error');
  if (!input || !btn) return;

  const pw = input.value;
  if (!pw) { showError(err, 'Please enter the password.'); return; }

  btn.disabled = true;
  txt.innerHTML = 'Checking<span class="spinner"></span>';
  err.classList.remove('show');

  try {
    const hex = await sha256Hex(pw);
    if (hex === STUDY_HASH) {
      location.hash = '#' + hex;
    } else {
      btn.disabled = false;
      txt.textContent = 'Enter';
      showError(err, 'Incorrect password. Please try again.');
      input.value = '';
      input.focus();
    }
  } catch (e) {
    btn.disabled = false;
    txt.textContent = 'Enter';
    showError(err, 'An error occurred. Please try again.');
  }
}

function showError(el, msg) {
  el.textContent = msg;
  el.classList.add('show');
}

async function generateQuizQuestions(eventName) {
  const prompt = `Generate exactly 25 multiple-choice practice quiz questions for the FBLA competitive event: "${eventName}".

Return ONLY a valid JSON array with exactly 25 objects. Each object must have:
- "q": the question text (string)
- "opts": array of exactly 4 answer choices (strings, no letter labels like "A." or "1.")
- "ans": 0-based integer index of the correct answer (0, 1, 2, or 3)
- "exp": brief explanation of why the correct answer is right (1-2 sentences)

Questions should cover key topics, vocabulary, concepts, formulas, and skills tested in the FBLA ${eventName} objective exam. Vary difficulty (easy, medium, hard). Do not repeat questions.

Return ONLY the JSON array — no markdown, no code fences, no extra text.`;

  try {
    const response = await callGemini({
      contents: [{ role: 'user', parts: [{ text: prompt }] }],
      generationConfig: {
        temperature: 0.7,
        maxOutputTokens: 8192,
        responseMimeType: 'application/json',
      },
    });

    if (!response.ok) {
      const errJson = await response.json().catch(() => ({}));
      throw new Error(errJson?.error?.message || `HTTP ${response.status}`);
    }

    const data = await response.json();
    const raw = data?.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!raw) throw new Error('Empty response from AI.');

    let questions;
    try {
      questions = JSON.parse(raw);
    } catch (_) {
      const match = raw.match(/\[[\s\S]*\]/);
      if (!match) throw new Error('Could not parse questions from AI response. Try again.');
      questions = JSON.parse(match[0]);
    }

    if (!Array.isArray(questions) || questions.length === 0) {
      throw new Error('No questions returned. Please try again.');
    }

    questions = questions.map(q => ({
      q:    String(q.q   || '').trim(),
      opts: Array.isArray(q.opts) ? q.opts.slice(0, 4).map(String) : [],
      ans:  Number.isInteger(q.ans) ? Math.max(0, Math.min(3, q.ans)) : 0,
      exp:  String(q.exp  || '').trim(),
    })).filter(q => q.q && q.opts.length === 4).slice(0, 25);

    if (questions.length < 25) {
      throw new Error(`Only ${questions.length} usable questions returned (need 25). Please try again.`);
    }

    startQuizSession(eventName, questions);

  } catch (err) {
    const safeEvent = escapeHtml(eventName);
    document.getElementById('quiz-overlay').innerHTML = `
      <div class="quiz-box">
        <div class="quiz-header">
          <span class="quiz-title">${safeEvent} — Practice Quiz</span>
          <button onclick="hideQuizOverlay()" style="background:none;border:none;color:rgba(255,255,255,.8);font-size:1.4rem;cursor:pointer;line-height:1;flex-shrink:0;" aria-label="Close">&#x2715;</button>
        </div>
        <div class="quiz-loading">
          <p style="font-size:2.5rem;line-height:1;">&#x26A0;&#xFE0F;</p>
          <p style="font-weight:700;color:#c62828;">Failed to generate quiz</p>
          <p style="font-size:.83rem;color:var(--text-muted);max-width:360px;">${escapeHtml(err.message)}</p>
          <button class="quiz-next-btn" style="max-width:200px;margin-top:.5rem;" data-event="${escapeHtml(eventName)}" onclick="startQuiz(this.dataset.event)">Try Again</button>
          <button onclick="hideQuizOverlay()" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:.82rem;margin-top:.25rem;text-decoration:underline;">Cancel</button>
        </div>
      </div>`;
  }
}

function startQuizSession(eventName, questions) {
  quizState = {
    eventName,
    questions,
    current:       0,
    answers:       new Array(questions.length).fill(null),
    startTime:     Date.now(),
    timerInterval: null,
    timeLimit:     300,
    timeLeft:      300,
    finished:      false,
  };

  renderCurrentQuestion();

  quizState.timerInterval = setInterval(() => {
    if (!quizState || quizState.finished) return;
    quizState.timeLeft -= 1;
    updateTimerDisplay();
    if (quizState.timeLeft <= 0) {
      clearInterval(quizState.timerInterval);
      finishQuiz(true);
    }
  }, 1000);
}

function updateTimerDisplay() {
  const el = document.getElementById('quiz-timer');
  if (!el || !quizState) return;
  el.textContent = formatQuizTime(quizState.timeLeft);
  if (quizState.timeLeft <= 60) el.classList.add('warning');
  else el.classList.remove('warning');
}

function renderCurrentQuestion() {
  if (!quizState) return;
  const { questions, current, timeLeft, eventName } = quizState;
  const q       = questions[current];
  const total   = questions.length;
  const progress = (current / total) * 100;
  const letters  = ['A','B','C','D'];

  document.getElementById('quiz-overlay').innerHTML = `
    <div class="quiz-box">
      <div class="quiz-header">
        <span class="quiz-title">${escapeHtml(eventName)}</span>
        <div class="quiz-meta">
          <span style="opacity:.85">${current + 1}&thinsp;/&thinsp;${total}</span>
          <span class="quiz-timer ${timeLeft <= 60 ? 'warning' : ''}" id="quiz-timer">${formatQuizTime(timeLeft)}</span>
        </div>
        <button onclick="confirmQuitQuiz()" style="background:none;border:none;color:rgba(255,255,255,.7);font-size:1.3rem;cursor:pointer;line-height:1;padding:0;flex-shrink:0;" aria-label="Quit quiz">&#x2715;</button>
      </div>
      <div class="quiz-progress-bar">
        <div class="quiz-progress-fill" style="width:${progress}%"></div>
      </div>
      <div class="quiz-body">
        <div class="quiz-question-num">Question ${current + 1} of ${total}</div>
        <div class="quiz-question-text">${escapeHtml(q.q)}</div>
        <div class="quiz-options" id="quiz-options">
          ${q.opts.map((opt, i) => `
            <button class="quiz-option" id="opt-${i}" onclick="selectAnswer(${i})">
              <span class="opt-letter">${letters[i]}</span>
              <span>${escapeHtml(opt)}</span>
            </button>`).join('')}
        </div>
        <div id="quiz-feedback"></div>
      </div>
    </div>`;
}

function selectAnswer(chosenIdx) {
  if (!quizState) return;
  const { questions, current } = quizState;
  const q       = questions[current];
  const letters = ['A','B','C','D'];

  quizState.answers[current] = chosenIdx;

  document.querySelectorAll('.quiz-option').forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.ans)                          btn.classList.add('correct');
    else if (i === chosenIdx && i !== q.ans)  btn.classList.add('wrong');
  });

  const isLast    = (current + 1) >= questions.length;
  const isCorrect = chosenIdx === q.ans;
  const feedback  = document.getElementById('quiz-feedback');

  feedback.innerHTML = `
    <div style="margin-top:.9rem;padding:.8rem 1rem;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);font-size:.82rem;color:var(--text-muted);line-height:1.55;">
      <strong style="color:${isCorrect ? '#2e7d32' : '#c62828'}">${isCorrect ? '&#x2713; Correct!' : '&#x2717; Incorrect.'}</strong>
      ${q.exp ? ' ' + escapeHtml(q.exp) : ''}
    </div>
    <button class="quiz-next-btn" onclick="${isLast ? 'finishQuiz(false)' : 'nextQuestion()'}">
      ${isLast ? 'See Results &#x2192;' : 'Next Question &#x2192;'}
    </button>`;
}

function nextQuestion() {
  if (!quizState) return;
  quizState.current += 1;
  if (quizState.current >= quizState.questions.length) finishQuiz(false);
  else renderCurrentQuestion();
}

function confirmQuitQuiz() {
  if (confirm('Quit this quiz? Your progress will not be saved.')) hideQuizOverlay();
}

function finishQuiz(timedOut) {
  if (!quizState || quizState.finished) return;
  quizState.finished = true;
  clearInterval(quizState.timerInterval);

  const elapsed   = Math.round((Date.now() - quizState.startTime) / 1000);
  const { questions, answers, eventName } = quizState;
  const total     = questions.length;
  const correct   = answers.reduce((n, a, i) => n + (a === questions[i].ans ? 1 : 0), 0);
  const pct       = Math.round((correct / total) * 100);
  const letters   = ['A','B','C','D'];

  const history = loadQuizHistory();
  history.unshift({
    event:     eventName,
    score:     correct,
    total,
    pct,
    timeTaken: elapsed,
    date:      new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
  });
  localStorage.setItem('fbla_quiz_history', JSON.stringify(history.slice(0, 50)));

  const missed = questions
    .map((q, i) => ({ q, userAns: answers[i] }))
    .filter(({ q, userAns }) => userAns !== q.ans);

  const missedHtml = missed.length === 0
    ? '<p style="text-align:center;color:#2e7d32;font-weight:600;padding:1rem 0;">Perfect score — no missed questions! &#x1F389;</p>'
    : missed.map(({ q, userAns }) => `
        <div class="review-item">
          <div class="rq">${escapeHtml(q.q)}</div>
          <div class="ra">
            ${userAns !== null
              ? `Your answer: <span style="color:#c62828">${letters[userAns]}. ${escapeHtml(q.opts[userAns])}</span><br/>`
              : '<em>Not answered (time ran out)</em><br/>'}
            Correct: <span style="color:#2e7d32;font-weight:600">${letters[q.ans]}. ${escapeHtml(q.opts[q.ans])}</span><br/>
            ${q.exp ? `<em style="opacity:.8">${escapeHtml(q.exp)}</em>` : ''}
          </div>
        </div>`).join('');

  const circleColor = pct >= 80 ? '#2e7d32' : pct >= 60 ? 'var(--primary)' : '#c62828';

  document.getElementById('quiz-overlay').innerHTML = `
    <div class="quiz-box">
      <div class="quiz-header">
        <span class="quiz-title">${escapeHtml(eventName)} &mdash; Results</span>
        <button onclick="hideQuizOverlay()" style="background:none;border:none;color:rgba(255,255,255,.8);font-size:1.4rem;cursor:pointer;line-height:1;flex-shrink:0;" aria-label="Close">&#x2715;</button>
      </div>
      <div class="quiz-score-screen">
        ${timedOut ? '<p style="color:#c62828;font-weight:700;margin-bottom:.75rem;">&#x23F1; Time\'s up!</p>' : ''}
        <div class="quiz-score-circle" style="border-color:${circleColor}">
          <span class="quiz-score-pct" style="color:${circleColor}">${pct}%</span>
          <span class="quiz-score-lbl">Score</span>
        </div>
        <div class="quiz-score-stats">
          <div class="quiz-stat">
            <span class="quiz-stat-val" style="color:#2e7d32">${correct}</span>
            <span class="quiz-stat-key">Correct</span>
          </div>
          <div class="quiz-stat">
            <span class="quiz-stat-val" style="color:#c62828">${total - correct}</span>
            <span class="quiz-stat-key">Missed</span>
          </div>
          <div class="quiz-stat">
            <span class="quiz-stat-val">${formatQuizTime(elapsed)}</span>
            <span class="quiz-stat-key">Time Taken</span>
          </div>
        </div>
        <div class="quiz-review">
          <h3>&#x1F4DD; Review Missed Questions (${missed.length})</h3>
          ${missedHtml}
        </div>
        <div class="quiz-score-actions">
          <button class="btn btn-primary" data-event="${escapeHtml(eventName)}" onclick="startQuiz(this.dataset.event)">Retake Quiz</button>
          <button class="btn" style="background:var(--surface);border:1px solid var(--border);color:var(--text);" onclick="hideQuizOverlay()">Back to Study</button>
        </div>
      </div>
    </div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// CHATBOT LOGIC
// ─────────────────────────────────────────────────────────────────────────────
const SYSTEM_PROMPT = `You are the FBLA Study Assistant for Pensacola High School's Future Business Leaders of America chapter. Your role is to help students prepare for FBLA competitive events at the district, state, and national levels.

You have deep knowledge of:
- All FBLA competitive events: written objective tests, performance events, and team events
- Business Calculations (financial math, interest, depreciation, payroll, ratios)
- Economics (micro/macro, supply/demand, GDP, monetary/fiscal policy, trade)
- Business Law (contracts, torts, business organizations, employment, consumer protection)
- Accounting I & II (journal entries, ledgers, trial balances, financial statements, depreciation, payroll)
- Business Communication (grammar, memo writing, business letters, professional email)
- Parliamentary Procedure (Robert's Rules of Order, motions, voting, quorum, minutes)
- Public Speaking (speech structure, delivery, professional presence)
- Marketing (4 Ps, market research, branding, advertising, consumer behavior)
- Entrepreneurship (business plans, startup finance, competitive analysis, pitching)
- Business Ethics (ethical frameworks, case analysis, stakeholder theory)
- Computer concepts, spreadsheet formulas (Excel/Sheets), and word processing
- Job interview preparation, résumé writing, professional etiquette
- FBLA history, mission, and organizational structure
- Test-taking strategies for timed FBLA objective tests
- State and National Leadership Conference preparation

Respond in a friendly, encouraging, and knowledgeable tone. When students ask about specific topics, provide clear explanations, practice questions, or key facts they should memorize. Always be accurate. If asked to quiz the student, generate relevant practice questions. Keep answers concise unless the student asks for more detail.`;

function chatKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
}

function appendMessage(role, text) {
  const container = document.getElementById('chat-messages');
  if (!container) return;

  const div = document.createElement('div');
  div.className = `message ${role}`;
  const bubbleContent = role === 'bot' ? renderMarkdown(text) : escapeHtml(text).replace(/\n/g, '<br>');
  div.innerHTML = `
    <div class="msg-name">${role === 'user' ? 'You' : 'FBLA Study Assistant'}</div>
    <div class="msg-bubble">${bubbleContent}</div>
  `;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  const container = document.getElementById('chat-messages');
  if (!container) return;
  const div = document.createElement('div');
  div.className = 'message bot';
  div.id = 'typing-indicator';
  div.innerHTML = `
    <div class="msg-name">FBLA Study Assistant</div>
    <div class="typing-indicator">
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
    </div>
  `;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  document.getElementById('typing-indicator')?.remove();
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderMarkdown(raw) {
  // 1. Strip <thinking>...</thinking> blocks (Gemma reasoning traces)
  let t = raw.replace(/<thinking>[\s\S]*?<\/thinking>/gi, '').trim();

  // 2. Escape HTML so we can safely insert user-facing content
  t = escapeHtml(t);

  // 3. Code blocks (``` ... ```) — preserve before other processing
  t = t.replace(/```[\w]*\n?([\s\S]*?)```/g, (_, code) =>
    `<pre style="background:#f4f4f4;border-radius:6px;padding:.6em .9em;overflow-x:auto;font-size:.85em"><code>${code.trim()}</code></pre>`
  );

  // 4. Inline code
  t = t.replace(/`([^`]+)`/g, '<code style="background:#f0f0f0;border-radius:3px;padding:.1em .35em;font-size:.9em">$1</code>');

  // 5. Bold+italic, bold, italic
  t = t.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/__(.+?)__/g, '<strong>$1</strong>');
  t = t.replace(/\*(?!\s)(.+?)(?<!\s)\*/g, '<em>$1</em>');

  // 6. Headings (## and ###)
  t = t.replace(/^### (.+)$/gm, '<h4 style="margin:.6em 0 .2em;font-size:1em">$1</h4>');
  t = t.replace(/^## (.+)$/gm,  '<h3 style="margin:.7em 0 .3em;font-size:1.05em">$1</h3>');
  t = t.replace(/^# (.+)$/gm,   '<h2 style="margin:.8em 0 .3em;font-size:1.1em">$1</h2>');

  // 7. Unordered lists (lines starting with * or -)
  t = t.replace(/((?:^[*\-] .+\n?)+)/gm, (block) => {
    const items = block.trim().split('\n').map(l =>
      `<li style="margin:.15em 0">${l.replace(/^[*\-] /, '')}</li>`
    ).join('');
    return `<ul style="margin:.4em 0;padding-left:1.4em">${items}</ul>`;
  });

  // 8. Ordered lists (lines starting with 1. 2. etc.)
  t = t.replace(/((?:^\d+\. .+\n?)+)/gm, (block) => {
    const items = block.trim().split('\n').map(l =>
      `<li style="margin:.15em 0">${l.replace(/^\d+\. /, '')}</li>`
    ).join('');
    return `<ol style="margin:.4em 0;padding-left:1.4em">${items}</ol>`;
  });

  // 9. Paragraphs — split on blank lines, wrap each chunk not already in a block tag
  const blockTags = /^<(h[234]|ul|ol|pre|li)/;
  const paras = t.split(/\n{2,}/);
  t = paras.map(p => {
    p = p.trim();
    if (!p) return '';
    if (blockTags.test(p)) return p;
    return '<p style="margin:.4em 0">' + p.replace(/\n/g, '<br>') + '</p>';
  }).join('');

  return t;
}

async function sendMessage() {
  if (isBotTyping) return;
  const input   = document.getElementById('chat-input');
  const sendBtn = document.getElementById('send-btn');

  const text = input?.value?.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  appendMessage('user', text);
  chatHistory.push({ role: 'user', parts: [{ text }] });

  isBotTyping = true;
  sendBtn.disabled = true;
  showTyping();

  try {
    const response = await callGemini({
      system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
      contents: chatHistory,
      generationConfig: {
        temperature: 0.7,
        topP: 0.95,
        maxOutputTokens: 1024,
      },
    });

    if (!response.ok) {
      const errJson = await response.json().catch(() => ({}));
      throw new Error(errJson?.error?.message || `HTTP ${response.status}`);
    }

    const data = await response.json();
    const reply = data?.candidates?.[0]?.content?.parts?.[0]?.text;

    if (!reply) throw new Error('Empty response from AI.');

    chatHistory.push({ role: 'model', parts: [{ text: reply }] });
    removeTyping();
    appendMessage('bot', reply);

  } catch (err) {
    removeTyping();
    const errMsg = err.message === 'NO_KEY'
      ? 'No API key configured. Ask your chapter admin to set one up.'
      : err.message.includes('API key') || err.message.includes('403') || err.message.includes('401')
        ? 'Invalid or expired API key. Please update it in the Admin Panel.'
        : `Error: ${err.message}. Check your internet connection.`;
    appendMessage('bot', errMsg);
  } finally {
    isBotTyping = false;
    sendBtn.disabled = !localStorage.getItem('fbla_gemini_key') && !_serverHasKey && !EMBEDDED_KEY;
  }
}

}
