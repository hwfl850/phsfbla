<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Pensacola High School FBLA – Future Business Leaders of America chapter site with study resources and AI-powered prep tools." />
  <meta property="og:title" content="Pensacola High FBLA" />
  <meta property="og:description" content="Future Business Leaders of America – Pensacola High School Chapter" />
  <meta property="og:type" content="website" />
  <title>Pensacola High FBLA</title>
  <link rel="icon" type="image/png" href="Media/favicon-emblem.png" />
  <link rel="apple-touch-icon" href="Media/favicon-emblem.png" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>

<header>
  <a class="logo-area" href="index.html" aria-label="Go to homepage">
    <img id="logo-national-img" class="logo-img" alt="FBLA — Future Business Leaders of America" />
    <div class="logo-chapter">
      <span class="chapter-school">Pensacola High</span>
      <span class="chapter-tag">Florida FBLA Chapter</span>
    </div>
  </a>

  <button class="hamburger" id="hamburger" aria-label="Toggle navigation" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>

  <nav id="main-nav" role="navigation" aria-label="Main navigation">
    <a href="index.html"    id="nav-home">Home</a>
    <a href="about.html"    id="nav-about">About</a>
    <a href="meetings.html" id="nav-meetings">Meetings</a>
    <a href="study.html"    id="nav-study" class="nav-accent">Study Resources</a>
  </nav>
</header>

<main id="main-content" role="main"></main>

<footer>
  <img id="logo-footer-img" class="footer-logo" alt="FBLA — Future Business Leaders of America" />
  <div style="font-weight:600;color:#fff;font-size:.95rem;">Pensacola High School <span style="opacity:.55;margin:0 .35rem;">·</span> Pensacola, FL</div>
  <div class="footer-divider" aria-hidden="true"></div>
  <a class="insta-link" href="https://www.instagram.com/pensacolahigh.fbla" target="_blank" rel="noopener" aria-label="Follow us on Instagram">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
    </svg>
    @pensacolahigh.fbla
  </a>
  <div class="footer-tag"><strong>Service</strong> &nbsp;·&nbsp; <strong>Education</strong> &nbsp;·&nbsp; <strong>Progress</strong></div>
  <a class="footer-admin" href="admin.html">Admin</a>
</footer>

<script src="assets/site.js"></script>
<script>
function renderHome() {
  const main = document.getElementById('main-content');
  const t = currentTheme();
  const c = currentContent();

  const eventsHtml = c.events.map(ev => `
      <div class="event-item">
        <div class="event-date">${escHtml(ev.date)}</div>
        <div class="event-info">
          <h4>${escHtml(ev.title)}</h4>
          <p>${escHtml(ev.desc)}</p>
        </div>
      </div>`).join('');

  // Only embed URLs from Google's calendar/forms/docs hosts — guard against arbitrary iframe injection
  const safeEmbed = (url) => {
    try {
      const u = new URL(url);
      if (u.protocol !== 'https:') return null;
      if (!/^([a-z0-9-]+\.)*google\.com$/i.test(u.hostname)) return null;
      return u.href;
    } catch (_) { return null; }
  };
  const calendarSrc = t.showCalendar ? safeEmbed(c.calendarEmbed) : null;
  const showEmbeds  = Boolean(calendarSrc);

  main.innerHTML = `
    <div class="hero">
      <div class="hero-content">
        <div class="anim" style="margin-bottom:1.5rem;">
          <img src="Media/Horizontal/PNG/FBLA_Logo_Horizontal_color-Reverse-LoRes.png"
            alt="FBLA — Future Business Leaders of America"
            style="height:72px;width:auto;display:inline-block;" />
        </div>
        <h1 class="anim anim-1">Pensacola High School<br>Future Business Leaders of America</h1>
        <p class="anim anim-2" style="display:flex;justify-content:center;gap:1rem;flex-wrap:wrap;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);">
          <span>Service</span>
          <span style="opacity:.55;">·</span>
          <span>Education</span>
          <span style="opacity:.55;">·</span>
          <span>Progress</span>
        </p>
        <div class="hero-actions anim anim-3">
          <a class="btn btn-primary" href="study.html" aria-label="Go to study resources">Study Resources</a>
          <a class="btn btn-outline" href="https://www.fbla-pbl.org/fbla/" target="_blank" rel="noopener">Learn About FBLA ↗</a>
        </div>
      </div>
    </div>

    ${t.showAnnouncement && c.announcement && c.announcement.title ? `
    <section class="announcement-section" id="section-announcement">
      <div class="announcement" role="region" aria-label="Chapter announcement">
        <div class="announcement-icon" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <path d="M3 11v2c0 .55.45 1 1 1h1l3.5 3.5c.63.63 1.71.18 1.71-.71V7.21c0-.89-1.08-1.34-1.71-.71L5 10H4c-.55 0-1 .45-1 1zm13.5 1c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v.5c0 .38.25.71.61.85C17.18 5.6 19 8.09 19 11s-1.82 5.4-4.39 6.42c-.36.14-.61.47-.61.85v.5c0 .63.63 1.07 1.21.85C18.66 18.36 21 14.95 21 11s-2.34-7.36-5.79-8.62c-.58-.22-1.21.22-1.21.85z"/>
          </svg>
        </div>
        <div class="announcement-body">
          ${c.announcement.badge ? `<div class="announcement-badge">${escHtml(c.announcement.badge)}</div>` : ''}
          <h3 class="announcement-title">${escHtml(c.announcement.title)}</h3>
          ${c.announcement.body ? `<p class="announcement-text">${escHtml(c.announcement.body)}</p>` : ''}
        </div>
        ${c.announcement.ctaText && c.announcement.ctaHref ? `
          <a class="announcement-cta" href="${escHtml(c.announcement.ctaHref)}">${escHtml(c.announcement.ctaText)} <span aria-hidden="true">&rarr;</span></a>
        ` : ''}
      </div>
    </section>
    ` : ''}

    ${t.showEvents && c.events.length ? `
    <section class="section" id="section-events">
      <div class="section-inner">
        <div class="section-eyebrow">This Year</div>
        <h2 class="section-title">Upcoming Events</h2>
        <div class="section-line"></div>
        <div class="events-list">${eventsHtml}</div>
      </div>
    </section>
    ` : ''}

    ${showEmbeds ? `
    <section class="section section-alt" id="section-embeds">
      <div class="section-inner">
        <div class="section-eyebrow">Stay Connected</div>
        <h2 class="section-title">Chapter Calendar</h2>
        <div class="section-line"></div>
        <div class="embeds-grid">
          <div class="embed-card">
            <div class="embed-card-head">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z"/></svg>
              Chapter Calendar
            </div>
            <iframe class="embed-frame" src="${escHtml(calendarSrc)}"
                    title="Chapter calendar" loading="lazy"
                    referrerpolicy="no-referrer"
                    sandbox="allow-scripts allow-same-origin allow-popups allow-forms"></iframe>
          </div>
        </div>
      </div>
    </section>
    ` : ''}

    ${t.showCta ? `
    <section class="section section-alt" id="section-cta">
      <div class="section-inner">
        <div class="cta-banner">
          <h2>Ready to Compete at the National Level?</h2>
          <p>Join Pensacola High FBLA and start your journey to the National Leadership Conference. Past members have earned scholarships and launched careers.</p>
          <div class="hero-actions">
            <a class="btn btn-primary" href="study.html">Start Studying</a>
            <a class="btn btn-outline" href="mailto:${escHtml(c.contactEmail)}">Contact Adviser</a>
          </div>
        </div>
      </div>
    </section>
    ` : ''}
  `;
}

function onSiteReady() {
  renderHome();
}
</script>
</body>
</html>
